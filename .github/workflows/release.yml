name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
          - os: ubuntu-latest
            script: dist:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # Using `npm install` rather than `npm ci` because npm doesn't apply the
        # package.json `overrides` block when validating the lockfile under
        # `ci`, so it reports phantom mismatches for keys we're deliberately
        # redirecting (rimraf@2 -> rimraf@6, etc.). `install` resolves overrides
        # correctly. We trade strict-lockfile reproducibility for working CI.
        run: npm install --no-audit --no-fund

      - name: Build installers
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder auto-publishes to a draft release when a tag is pushed.
          # On workflow_dispatch (no tag) it builds locally without publishing.

      - name: Upload artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v5
        with:
          name: newgen-navigator-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: ignore
